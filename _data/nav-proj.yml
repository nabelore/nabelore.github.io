- name: Sun says Moon says
  status: complete
  category: comics
  category2: personal
  link: /sunmoon
  link2: /assets/html/sunmoon.html
  link3:
  desc: >
    <blockquote>The celestial drama that created night and day.</blockquote>
    <p>A comic book retelling of the origin of the day and night cycle, it is based on the <span class="projectaboutitalics">Tinguian</span>, <span class="projectaboutitalics">Mandayan</span> and <span class="projectaboutitalics">Visayan</span> versions of the folktale, <i>The Sun and the Moon</i>, and features a world inspired by Philippine folktales and pre-colonial Philippine history and artifacts.</p>
    <p>First released at the <i>Philippine International Comics Festival</i> (PICOF) on July 5 and 6, 2025.</p>
    <p>Responsible for concept, creation and layout. Managed four other artists who assisted with concept art and background lineart.</p>
    <p>* assistants: Arianne Criseyde, Gia Lazo, Nichole Cruz, Rini Geronimo</p>
    <p>Interested? <a href=https://docs.google.com/forms/d/e/1FAIpQLSc1hu_VFRPe5vt9dGgXi4PmGIQQ78lgdDr58RxZi_O8OPoZFQ/viewform>Order a copy here</a>.</p>
    <div class="projectBit p-3">
      <i><h3>Details</h3></i> 
      <ul class="mb-0">
        <li>Rating: G / General Audiences</li>
        <li>70 comic pages / 76 pages total</li>
        <li>6" x 9"</li>
        <li>black & white with halftones</li>
      </ul>
    </div>
 
  img: /assets/proj/sunmoon/concept art.jpg
  featured: 0

